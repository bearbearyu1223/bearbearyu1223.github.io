<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" role="img"
     aria-label="The streaming chat flow. The browser's ChatPanel POSTs {mode, message} to the FastAPI messages route, which wraps the orchestrator's stream_response generator in an EventSourceResponse. The orchestrator retrieves (spoiler-filtered for page mode), builds the prompt, and calls ChatClient.stream(), whose tokens are emitted back to the browser as 'event: token' frames and appended to the assistant bubble. When the answer finishes, the orchestrator makes a second ChatClient.complete() call constrained by a JSON schema, parses and validates the two chips, and emits them on the 'event: done' frame. Clicking a chip calls sendMessage in that chip's mode, looping the flow. Underneath, chat_sessions.current_page — set by a PATCH on every page flip — is what the spoiler filter reads."
     style="display: block; width: 100%; height: auto; max-width: 1180px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;">
  <defs>
    <marker id="sse-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Browser -->
  <g>
    <rect x="30" y="120" width="250" height="190" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="155" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">Browser · ChatPanel</text>
    <text x="155" y="172" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">sendMessage(text, mode)</text>
    <text x="155" y="196" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">append each token to the bubble</text>
    <text x="155" y="216" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">render chips on the done event</text>
    <text x="155" y="244" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">click chip → sendMessage(s.mode)</text>
    <text x="155" y="284" text-anchor="middle" font-size="9" fill="#94a3b8"
          font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">fetch + ReadableStream</text>
  </g>

  <!-- POST arrow -->
  <line x1="280" y1="150" x2="470" y2="120" stroke="#6b7280" stroke-width="1.5" marker-end="url(#sse-arrow)"/>
  <text x="375" y="112" text-anchor="middle" font-size="10" fill="#475569"
        font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">POST {mode, message}</text>

  <!-- SSE token arrow back -->
  <line x1="470" y1="185" x2="280" y2="200" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sse-arrow)"/>
  <text x="375" y="180" text-anchor="middle" font-size="10" fill="#2563eb"
        font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">event: token ×N</text>

  <!-- SSE done arrow back -->
  <line x1="470" y1="245" x2="280" y2="260" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sse-arrow)"/>
  <text x="375" y="276" text-anchor="middle" font-size="10" fill="#7a4d7e"
        font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">event: done · {suggestions}</text>

  <!-- FastAPI / orchestrator -->
  <g>
    <rect x="470" y="90" width="270" height="230" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="605" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">FastAPI · messages.py</text>
    <text x="605" y="136" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">EventSourceResponse (frames SSE)</text>
    <line x1="490" y1="150" x2="720" y2="150" stroke="#cbd5e1" stroke-width="1"/>
    <text x="605" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">ChatOrchestrator</text>
    <text x="605" y="192" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">stream_response()</text>
    <text x="605" y="212" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">retrieve (spoiler-filtered)</text>
    <text x="605" y="230" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">→ prompt → stream tokens</text>
    <text x="605" y="256" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">then: validate + emit chips</text>
    <text x="605" y="292" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">one async generator, two event kinds</text>
  </g>

  <!-- ChatClient.stream -->
  <g>
    <rect x="800" y="110" width="200" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="900" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">ChatClient.stream()</text>
    <text x="900" y="160" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">yields the answer,</text>
    <text x="900" y="176" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">token by token</text>
  </g>
  <line x1="740" y1="200" x2="800" y2="160" stroke="#6b7280" stroke-width="1.5" marker-end="url(#sse-arrow)"/>

  <!-- ChatClient.complete -->
  <g>
    <rect x="800" y="220" width="200" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="900" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">ChatClient.complete()</text>
    <text x="900" y="268" text-anchor="middle" font-size="10" fill="#065f46"
          font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">json_format=schema</text>
    <text x="900" y="288" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">→ page_chip + wiki_chip</text>
  </g>
  <line x1="740" y1="250" x2="800" y2="262" stroke="#6b7280" stroke-width="1.5" marker-end="url(#sse-arrow)"/>

  <!-- Boundary footnote -->
  <g>
    <rect x="470" y="430" width="530" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="735" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">chat_sessions.current_page</text>
    <text x="735" y="480" text-anchor="middle" font-size="10" fill="#92400e">set by PATCH on every (debounced) page flip</text>
    <text x="735" y="498" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">the spoiler filter (Post 6) reads it — the boundary rides underneath, unchanged</text>
  </g>
  <line x1="605" y1="320" x2="650" y2="430" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="4,4" marker-end="url(#sse-arrow)"/>

  <!-- Legend -->
  <g>
    <rect x="30" y="430" width="14" height="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <text x="50" y="441" font-size="11" fill="#4b5563">code / process</text>
    <rect x="30" y="452" width="14" height="12" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="50" y="463" font-size="11" fill="#4b5563">provider abstraction</text>
    <rect x="30" y="474" width="14" height="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="50" y="485" font-size="11" fill="#4b5563">server-side state</text>
    <line x1="28" y1="502" x2="46" y2="502" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="50" y="506" font-size="11" fill="#4b5563">SSE event back to the browser</text>
  </g>
</svg>
