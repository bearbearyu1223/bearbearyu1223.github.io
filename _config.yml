# The Site Settings
theme: jekyll-theme-chirpy

lang: en

timezone: America/Los_Angeles

# Site identity
title: "Han's Generative AI Quest"
tagline: "Chronicling my journey through language models, from scratch."
description: >-
  Study notes and hands-on projects covering Stanford CS336,
  transformers, BPE tokenization, RLHF/GRPO, RAG, and more.

url: "https://bearbearyu1223.github.io"

github:
  username: bearbearyu1223

social:
  name: Han Yu
  email: ""
  links:
    - https://github.com/bearbearyu1223
    - https://www.linkedin.com/in/han-yu-goirish/
    - https://scholar.google.com/citations?user=h5LUDKYAAAAJ

# Display preferences
theme_mode: # leave empty for auto with toggle

avatar: "/assets/img/avatar.png"

toc: true

# Comments (can enable giscus later)
comments:
  provider: false

# Analytics
analytics:
  google:
    id: # fill in GA measurement ID if desired

# Pagination
paginate: 10

# Build settings
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

plugins:
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-redirect-from
